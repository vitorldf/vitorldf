name: Profile Automation

on:
  schedule:
    - cron: "0 0 * * *" 
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  generate-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Gerar Métricas Avançadas
        uses: lowlighter/metrics@latest
        with:
          filename: github-metrics.svg
          token: ${{ secrets.PRIVATE_STATS_TOKEN }}
          committer_token: ${{ secrets.PRIVATE_STATS_TOKEN }}
          config_timezone: America/Sao_Paulo
          # Configuração de Seções: Ativa apenas o cabeçalho e atividade
          base: header, activity, community
          base_skipped: repositories, metadata # Remove o bloco de repositórios e seguidores
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_details: percentage, lines-of-code-at-least-500
          # Community: Esconde seguidores/seguindo para focar nas organizações
          plugin_community: yes
          plugin_community_sections: organizations

  generate-snake:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Gerar a Animação da Cobrinha
        uses: Platane/snk@v3
        with:
          github_user_name: vitorldf
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.PRIVATE_STATS_TOKEN }}

      - name: Push da Cobrinha para a branch 'output'
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
